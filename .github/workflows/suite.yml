name: compat-suite

on:
  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      target_sha:
        required: true
        type: string

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        lang: [python, node, php, rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: |
          curl -H "Authorization: Bearer ${{ github.token }}" --retry 3 --proto '=https' --tlsv1.2 -sSf https://github.com/wasmerio/llvm-custom-builds/releases/download/22.x/llvm-linux-amd64.tar.xz -L -o /opt/llvm.tar.xz
          sudo mkdir -p /opt/llvm-22
          sudo tar xf /opt/llvm.tar.xz --strip-components=1 -C /opt/llvm-22
          echo /opt/llvm-22/bin >> "$GITHUB_PATH"
          echo LLVM_SYS_221_PREFIX=/opt/llvm-22 >> "$GITHUB_ENV"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: >
          cargo run --quiet -- run
          --lang ${{ matrix.lang }}
          --wasmer-repo "https://github.com/${{ inputs.target_repo }}.git"
          --wasmer-ref "${{ inputs.target_sha }}"
          --compare-ref origin/main
      - uses: actions/upload-artifact@v4
        with:
          name: compat-${{ matrix.lang }}
          path: |
            status_${{ matrix.lang }}.json
            metadata_${{ matrix.lang }}.json
            test_${{ matrix.lang }}.log
